<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel | KEDI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    section {
      margin-bottom: 40px;
      background-color: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #e3e3e3;
    }

    button {
      padding: 5px 10px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button.reject {
      background-color: #e74c3c;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
      padding: 8px;
    }

    .logout {
      display: block;
      width: 100px;
      margin: 0 auto;
      margin-top: 30px;
      padding: 10px;
      background-color: #34495e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body onload="loadAdminPanel()">
  <h1>Admin Dashboard – KEDI Money Network</h1>

  <!-- Users awaiting approval -->
  <section>
    <h2>Users Bategereje Kwemezwa</h2>
    <table id="pendingUsersTable">
      <thead>
        <tr>
          <th>Izina</th>
          <th>Username</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Referral ID</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Users bazashyirwa hano na JS -->
      </tbody>
    </table>
  </section>

  <!-- Approved Users -->
  <section>
    <h2>Users Bemejwe</h2>
    <table id="approvedUsersTable">
      <thead>
        <tr>
          <th>Izina</th>
          <th>Username</th>
          <th>Phone</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody>
        <!-- Users bazashyirwa hano -->
      </tbody>
    </table>
  </section>

  <!-- Transaction History -->
  <section>
    <h2>Amateka y'Amafaranga (Transactions)</h2>
    <table id="transactionTable">
      <thead>
        <tr>
          <th>Username</th>
          <th>Ubwoko</th>
          <th>Umubare</th>
          <th>Itariki</th>
        </tr>
      </thead>
      <tbody>
        <!-- Transaction details -->
      </tbody>
    </table>
  </section>

  <!-- Message / Bonus section -->
  <section>
    <h2>Tanga Bonus cyangwa Message</h2>
    <textarea id="adminMessage" placeholder="Andika ubutumwa cyangwa bonus..."></textarea>
    <button onclick="submitMessage()">Ohereza</button>
  </section>

  <button class="logout" onclick="logout()">Logout</button>

  <script>
  // Access control: reba niba admin yinjiriye
  document.addEventListener("DOMContentLoaded", () => {
    const isAdmin = localStorage.getItem("isAdmin");
    if (isAdmin !== "true") {
      alert("Uramutse utari admin, ugomba kwinjira mbere!");
      window.location.href = "admin-login.html";
    }
  });

  // Logout function (hano uyishyira muri admin.html)
  function logout() {
    localStorage.removeItem("isAdmin");
    window.location.href = "admin-login.html";
  }
</script>

</body>
</html>
