<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form ya Transaction - KEDI Money Network</title>
  <style>
    body {
      font-family: sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      background: #fff;
      padding: 20px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #006400;
    }
    label {
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      background-color: #006400;
      color: white;
      padding: 12px;
      border: none;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #004d00;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Ohereza Igikorwa</h2>
    <form id="transactionForm" onsubmit="submitTransaction(event)">
      <label for="type">Ubwoko bw'Igikorwa:</label>
      <select id="type" name="type" required>
        <option value="">-- Hitamo --</option>
        <option value="save">Kwizigama</option>
        <option value="withdraw">Kubikuza</option>
        <option value="loan">Inguzanyo</option>
      </select>

      <label for="amount">Umubare w'Amafaranga (RWF):</label>
      <input type="number" id="amount" name="amount" required />

      <label for="txnId">Transaction ID:</label>
      <input type="text" id="txnId" name="txnId" required />

      <label for="description">Ibisobanuro:</label>
      <textarea id="description" name="description" placeholder="Sobanura igikorwa..." rows="3"></textarea>

      <button type="submit">Ohereza</button>
    </form>
  </div>

  <script src="main.js"></script>
</body>
</html>
