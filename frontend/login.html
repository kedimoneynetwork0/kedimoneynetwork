<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KEDI Money Network - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e8f0fe;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .login-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      text-align: center;
      color: #2b6cb0;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background-color: #2b6cb0;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #1e4e8c;
    }
    .link {
      margin-top: 15px;
      text-align: center;
    }
    .link a {
      text-decoration: none;
      color: #2b6cb0;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Injira muri KEDI</h2>
    <form id="loginForm" onsubmit="loginUser(event)">
      <label for="username">Username cyangwa Email</label>
      <input type="text" id="username" name="username" required />

      <label for="password">Ijambo ry'ibanga</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">Injira</button>

      <div class="link">
        Nta konti uragira? <a href="signup.html">Iyandikishe hano</a>
      </div>
    </form>
  </div>

  <script src="main.js"></script>
</body>
</html>
