<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KEDI Money Network - Tree Plan</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      margin: 0;
      padding: 20px;
    }

    header {
      background-color: #00b894;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .tree-container {
      background: white;
      border-radius: 10px;
      padding: 20px;
      max-width: 1000px;
      margin: 30px auto;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    h2 {
      color: #00b894;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      background-color: #f9f9f9;
      text-align: center;
    }

    .referral-list {
      margin-top: 30px;
    }

    .referral-list h3 {
      margin-bottom: 10px;
    }

    .referral-item {
      padding: 10px;
      border-bottom: 1px solid #ccc;
    }

    button {
      background-color: #00b894;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: #019670;
    }
  </style>
</head>
<body onload="loadTreeData()">
    <h1>Tree Plan & Ibikorwa bya Company</h1>
  </header>

  <div class="tree-container">
    <h2>Ibyagezweho na Company</h2>

    <div class="stats">
      <div class="card">
        <h3>Abakoresha Bose</h3>
        <p id="total-users">--</p>
      </div>
      <div class="card">
        <h3>Transactions Zose</h3>
        <p id="total-transactions">--</p>
      </div>
      <div class="card">
        <h3>Umutungo Winjiye</h3>
        <p id="total-amount">-- RWF</p>
      </div>
      <div class="card">
        <h3>Amashami / Tree</h3>
        <p id="tree-nodes">--</p>
      </div>
    </div>

    <div class="referral-list">
      <h3>Abakoresha & Referral Network</h3>
      <div id="referrals">
        <!-- List of referrals will be dynamically inserted here -->
      </div>
    </div>

    <button onclick="goBack()">Subira kuri Dashboard</button>
  </div>

  <script>
    async function loadTreeData() {
      const token = localStorage.getItem("token");
      if (!token) {
        window.location.href = "login.html";
        return;
      }

      try {
        const response = await fetch("https://kedi-moneynetwork.onrender.com/api/users/tree", {
          headers: {
            Authorization: `Bearer ${token}`
          }
        });
        const data = await response.json();

        document.getElementById("total-users").textContent = data.totalUsers || 0;
        document.getElementById("total-transactions").textContent = data.totalTransactions || 0;
        document.getElementById("total-amount").textContent = data.totalAmount || "0";
        document.getElementById("tree-nodes").textContent = data.totalNodes || 0;

        const referralList = document.getElementById("referrals");
        referralList.innerHTML = "";

        data.referrals.forEach(ref => {
          const div = document.createElement("div");
          div.className = "referral-item";
          div.textContent = `👤 ${ref.name} - Referral ID: ${ref.referralId} - Downlines: ${ref.downlines.length}`;
          referralList.appendChild(div);
        });
      } catch (err) {
        alert("Ntibyagenze neza, ongera ugerageze.");
      }
    }

    function goBack() {
      window.location.href = "dashboard.html";
    }

    document.addEventListener("DOMContentLoaded", loadTreeData);
  </script>
</body>
</html>
